<script>
        // Simple card interaction logic
        const flashcard = document.getElementById('flashcard');
        const hintArea = document.getElementById('hint-area');
        const translationText = document.getElementById('translation-text');
        const hintPrompt = hintArea.querySelector('p:first-child');
        flashcard.addEventListener('click', () => {
            translationText.classList.toggle('hidden');
            hintPrompt.classList.toggle('hidden');

            if (!translationText.classList.contains('hidden')) {
                flashcard.classList.add('border-secondary/30');
                flashcard.classList.remove('border-primary/10');
            } else {
                flashcard.classList.remove('border-secondary/30');
                flashcard.classList.add('border-primary/10');
            }
        });
        // Small Haptic feedback simulation for buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', () => {
                if ('vibrate' in navigator) {
                    navigator.vibrate(10);
                }
            });
        });
    </script>
