<script>
        // Micro-interaction for the success icon
        document.addEventListener('DOMContentLoaded', () => {
            const checkIcon = document.querySelector('.material-symbols-outlined[data-icon="check_circle"]');
            if (checkIcon) {
                checkIcon.animate([
                    { transform: 'scale(0) rotate(-45deg)', opacity: 0 },
                    { transform: 'scale(1.2) rotate(10deg)', opacity: 1, offset: 0.7 },
                    { transform: 'scale(1) rotate(0deg)', opacity: 1 }
                ], {
                    duration: 600,
                    easing: 'cubic-bezier(0.175, 0.885, 0.32, 1.275)',
                    fill: 'forwards'
                });
            }
            // Button click ripple effect simulation
            const primaryBtn = document.querySelector('button');
            primaryBtn.addEventListener('click', () => {
                primaryBtn.classList.add('bg-white/20');
                setTimeout(() => primaryBtn.classList.remove('bg-white/20'), 200);
            });
        });
