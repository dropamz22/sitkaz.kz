<!DOCTYPE html>

            background: rgba(30, 32, 36, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(60, 73, 72, 0.3);
        }
        .ornament-pattern {
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 10c-5 0-10 5-10 10s5 10 10 10 10-5 10-10-5-10-10-10zm0 4c3.3 0 6 2.7 6 6s-2.7 6-6 6-6-2.7-6-6 2.7-6 6-6zM20 40c-5 0-10 5-10 10s5 10 10 10 10-5 10-10-5-10-10-10zm0 4c3.3 0 6 2.7 6 6s-2.7 6-6 6-6-2.7-6-6 2.7-6 6-6zm60 0c-5 0-10 5-10 10s5 10 10 10 10-5 10-10-5-10-10-10zm0 4c3.3 0 6 2.7 6 6s-2.7 6-6 6-6-2.7-6-6 2.7-6 6-6zM50 70c-5 0-10 5-10 10s5 10 10 10 10-5 10-10-5-10-10-10zm0 4c3.3 0 6 2.7 6 6s-2.7 6-6 6-6-2.7-6-6 2.7-6 6-6z' fill='%2343ded4' fill-rule='evenodd'/%3E%3C/svg%3E");
        }
        .ram-horn-corner {
            position: absolute;
            width: 80px;
            height: 80px;
            opacity: 0.15;
            pointer-events: none;
        }
        .glow-pulse {
            animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 0.2; transform: scale(1.1); }
        }
        .word-chip-active {
            box-shadow: 0 0 15px rgba(67, 222, 212, 0.1);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .word-chip-active:active {
            transform: scale(0.95);
        }
        .drop-zone-dashed {
            background-image: url("data:image/svg+xml,%3Csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='100%25' height='100%25' fill='none' rx='12' ry='12' stroke='%23859491' stroke-width='2' stroke-dasharray='8%2C 12' stroke-dashoffset='0' stroke-linecap='square'/%3E%3C/svg%3E");
        }
    </style>

                        "error-container": "#93000a",
                        "tertiary-container": "#a6aebe",
                        "on-primary": "#003734",

                        "background": "#111317",

                        "on-error-container": "#ffdad6",
                        "on-secondary-fixed": "#241a00",
                        "on-primary-fixed-variant": "#00504b",
                        "surface-variant": "#333539",
                        "surface-container-highest": "#333539",
                        "primary-fixed": "#65f8ed",
                        "on-tertiary": "#29313d",
                        "surface": "#111317",
                        "primary": "#43ded4",
                        "on-tertiary-container": "#3a424f",
                        "surface-container": "#1e2024",
                        "inverse-on-surface": "#2f3035",
                        "outline": "#859491",

                        "container-max": "1200px",

                    "fontFamily": {
                        "headline-md": ["Plus Jakarta Sans"],
                        "label-mono": ["JetBrains Mono"],

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="min-h-screen relative flex flex-col font-body-md text-body-md">
<!-- Atmospheric Background Layers -->
<div class="fixed inset-0 ornament-pattern pointer-events-none"></div>
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px] glow-pulse"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/10 rounded-full blur-[120px] glow-pulse"></div>
<!-- Top Navigation Header -->
<header class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-4 h-16 bg-surface/60 backdrop-blur-xl border-b border-outline-variant/30">
<a class="flex items-center gap-2 text-primary hover:opacity-80 transition-all active:scale-95" href="#">
<span class="material-symbols-outlined">arrow_back</span>
<span class="font-headline-md text-headline-md leading-none">← К уроку</span>
</a>
<div class="flex items-center gap-2 bg-surface-container-high px-3 py-1.5 rounded-full border border-outline-variant/50">
<span class="material-symbols-outlined text-secondary text-[18px]">verified</span>
<span class="font-label-mono text-label-mono text-on-surface">Экзамен · вопрос 3 из 5 · верно: 2</span>
</div>
<div class="w-24 md:flex hidden justify-end">
<div class="text-primary font-bold text-headline-md">sitkaz.kz</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-24 pb-32 px-4 flex flex-col items-center justify-center max-w-2xl mx-auto w-full relative">
<!-- Question Category Chip -->
<div class="mb-8 text-center">
<span class="font-label-mono text-label-mono uppercase tracking-widest text-outline bg-surface-variant/30 px-4 py-1 rounded-full border border-outline-variant/20">
                Собери фразу из слов
            </span>
</div>
<!-- Russian Prompt Phrase -->
<div class="mb-12 text-center relative">
<h1 class="font-display-lg-mobile text-display-lg-mobile text-on-surface mb-2">Рад с вами познакомиться</h1>
<div class="w-12 h-1 bg-primary/40 mx-auto rounded-full"></div>
</div>
<!-- Word Drop Zone -->
<section class="w-full min-h-[140px] drop-zone-dashed rounded-xl p-6 flex flex-wrap gap-3 items-center justify-center mb-16 transition-all duration-300">
<!-- Used Word 1 -->
<div class="bg-primary-container text-on-primary-container font-kazakh-prompt text-kazakh-prompt px-6 py-3 rounded-xl shadow-lg border border-primary/30 flex items-center gap-2 animate-in fade-in zoom-in duration-300">
<span>Сізбен</span>
<span class="material-symbols-outlined text-[16px] opacity-60 cursor-pointer hover:opacity-100">close</span>
</div>
<!-- Used Word 2 -->
<div class="bg-primary-container text-on-primary-container font-kazakh-prompt text-kazakh-prompt px-6 py-3 rounded-xl shadow-lg border border-primary/30 flex items-center gap-2 animate-in fade-in zoom-in duration-300">
<span>танысқаныма</span>
<span class="material-symbols-outlined text-[16px] opacity-60 cursor-pointer hover:opacity-100">close</span>
</div>
</section>
<!-- Word Bank -->
<section class="w-full flex flex-wrap gap-4 justify-center items-center">
<!-- Dimmed Word 1 (Сізбен) -->
<div class="bg-surface-container-highest/40 text-on-surface/20 font-kazakh-prompt text-kazakh-prompt px-6 py-3 rounded-xl border border-outline-variant/10 cursor-not-allowed select-none">
                Сізбен
            </div>
<!-- Active Word (қуаныштымын) -->
<button class="bg-surface-container-high text-on-surface font-kazakh-prompt text-kazakh-prompt px-6 py-3 rounded-xl border border-outline-variant/50 word-chip-active hover:border-primary/50 hover:bg-surface-variant transition-all active:bg-primary/10">
                қуаныштымын
            </button>
<!-- Dimmed Word 2 (танысқаныма) -->
<div class="bg-surface-container-highest/40 text-on-surface/20 font-kazakh-prompt text-kazakh-prompt px-6 py-3 rounded-xl border border-outline-variant/10 cursor-not-allowed select-none">
                танысқаныма
            </div>
</section>
</main>
<!-- Fixed Bottom Actions -->
<footer class="fixed bottom-0 left-0 right-0 px-4 pb-8 pt-4 bg-gradient-to-t from-background via-background to-transparent z-40">
<div class="max-w-2xl mx-auto flex flex-col gap-4">
<!-- Secondary Decorative Ram Horn Ornament -->
<div class="flex justify-between items-center px-4 opacity-30 pointer-events-none">
<svg class="text-primary transform -scale-x-100" fill="none" height="40" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" width="40">
<path d="M12 4C8 4 4 8 4 12C4 16 8 20 12 20M12 4C16 4 20 8 20 12C20 16 16 20 12 20" stroke-linecap="round"></path>
</svg>
<svg class="text-primary" fill="none" height="40" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" width="40">
<path d="M12 4C8 4 4 8 4 12C4 16 8 20 12 20M12 4C16 4 20 8 20 12C20 16 16 20 12 20" stroke-linecap="round"></path>
</svg>
</div>
<button class="w-full h-14 bg-primary text-on-primary font-headline-md text-headline-md rounded-xl shadow-[0_4px_24px_rgba(64,220,209,0.3)] hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>Проверить</span>
<span class="material-symbols-outlined">chevron_right</span>
</button>
</div>
</footer>
<!-- Micro-interaction script -->
<script>
        document.querySelectorAll('.word-chip-active').forEach(button => {
            button.addEventListener('click', function() {
                this.classList.add('scale-110', 'border-primary');
                setTimeout(() => {
                    this.classList.remove('scale-110', 'border-primary');
                }, 200);
            });
        });
        const canvas = document.createElement('div');
        canvas.className = 'fixed inset-0 pointer-events-none overflow-hidden';
        document.body.appendChild(canvas);
        for (let i = 0; i < 5; i++) {
            const shape = document.createElement('div');
            shape.className = 'absolute bg-primary/5 rounded-full blur-3xl';
            shape.style.width = Math.random() * 300 + 100 + 'px';
            shape.style.height = shape.style.width;
            shape.style.left = Math.random() * 100 + '%';
            shape.style.top = Math.random() * 100 + '%';
            shape.style.animation = `float ${Math.random() * 10 + 10}s infinite ease-in-out`;
            canvas.appendChild(shape);
        }
        const style = document.createElement('style');
        style.textContent = `
            @keyframes float {
                0%, 100% { transform: translate(0, 0); }
                50% { transform: translate(${Math.random() * 50 - 25}px, ${Math.random() * 50 - 25}px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body></html>
