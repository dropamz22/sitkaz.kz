<script>
        function playAudio() {
            // Haptic/Visual feedback for the speaker icon
            const speaker = document.querySelector('.material-symbols-outlined[data-icon="volume_up"]');
            speaker.classList.add('scale-125', 'text-secondary');
            setTimeout(() => {
                speaker.classList.remove('scale-125', 'text-secondary');
            }, 300);

            // Logic to play sound would go here
            console.log("Playing Kazakh audio prompt...");
        }
        // Add a micro-glow follows mouse for glass effects
        document.addEventListener('mousemove', (e) => {
            const cards = document.querySelectorAll('.glass-card');
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                card.style.setProperty('--mouse-x', `${x}px`);
                card.style.setProperty('--mouse-y', `${y}px`);
            });
        });
    </script>
