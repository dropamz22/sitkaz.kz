<style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }

        .super-ellipse {
            border-radius: 48px;
        }
        .pebble-shadow {
            box-shadow: 0 40px 80px -20px rgba(51, 71, 92, 0.08);

        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.03); opacity: 0.9; }
        }
        .animate-pulse-soft {
            animation: pulse-soft 3s infinite ease-in-out;
        }
        .mountain-bg {
            background: linear-gradient(180deg, #f7f9ff 0%, #eef4ff 100%);
            overflow: hidden;
        }
        .glass-capsule {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        /* Subtle tactile press effect */
        .active-press:active {
            transform: scale(0.96);
            transition: transform 0.1s;
        }

<body class="mountain-bg min-h-screen flex flex-col text-on-surface font-body-md overflow-x-hidden">

<div class="active-press">

</div>
<h1 class="font-title-md text-title-md font-bold text-primary">⭐ Білгір</h1>
<div class="w-10 h-10 rounded-full border-2 border-surface-container-high overflow-hidden shadow-sm active-press">

</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-md mx-auto px-gutter py-md flex flex-col items-center relative">
<!-- Watercolor Background Aesthetic Elements -->
<div class="absolute top-40 -left-20 w-80 h-80 opacity-20 pointer-events-none">
<img class="w-full h-full object-contain" data-alt="Soft, dreamy watercolor painting of snow-capped mountain peaks in shades of pale blue and icy white." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB4ZuQcrXci44iGud1KabVqH6q_LC31mjD1DC700VwHYMG3D9QuijIUmYMVN1tKOiApLdKbHWMDzgOXSUG--7bePpDPnrQ-Qo5sF6TPfkDz7rCxoiNNsKCI_j0rCrgZWRRCxFEOtD_LUEOEjQOajKvqELdiFuFVv3deb8kJZJ9sqSB-duAZf6BRRPfEXGTjUt37JruwVaHazc0cDGwETC-Axxr0Dkstu7sTOx-jB8zkA-KJfnusbcAXWIWVFbN9CARokKt9JP59nyU"/>
</div>
<!-- Session Capsule -->
<div class="glass-capsule rounded-full px-6 py-2 shadow-sm mb-lg animate-fade-in flex items-center gap-2 border border-surface-container">
<span class="font-label-lg text-secondary text-xs uppercase tracking-widest flex items-center gap-2">

<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
                повторение: <span class="text-primary font-bold">12</span>
<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
                новых: <span class="text-primary font-bold">4</span>
</span>
</div>
<!-- Flashcard Area -->
<div class="relative w-full mt-12 mb-lg">
<!-- Mascot Peeking -->
<div class="absolute -top-16 left-1/2 -translate-x-1/2 z-10 w-32 pointer-events-none">
<img class="w-full h-auto" data-alt="A friendly snow leopard mascot playfully hanging its front paws over an invisible edge, looking at the user with warm amber eyes." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCveFuOov_E7nom79QDSiblwpZ0SCXGagj_6PTNDvARh7hPp_mcWlqjk6IYgeaNxXMILDq4AzQGBnfDmIDcZ0oqvFLcogPwQxmO9Vy7NxJpvEyIZk__-5f_q7zwe-we5Ljmsm8b8dIsigBh9cTnjSR5_ahjSuq-1wqZ1bm2EZEGbW2HW2-h5Bebr1DqnhTIMVi7zZg_g7j4VKmZqIZieA-IQWQqXOOXWGt3OFH1845Hk5MHqjM3gaJGNMTf_-VMX5MisL5BRYiKBOc"/>

<!-- The Pebble Card -->

<!-- Paw Print Watermark -->
<div class="absolute inset-0 flex items-center justify-center opacity-5 pointer-events-none">
<span class="material-symbols-outlined text-[160px]">pets</span>
</div>
<!-- Card Content -->
<div class="text-center z-20 flex flex-col items-center gap-4">

<div class="flex items-center gap-3">
<span class="text-secondary font-body-lg text-opacity-80 italic">[сиз кайдансыз]</span>
<button class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center text-primary active-press transition-colors hover:bg-surface-container-high">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">volume_up</span>
</button>
</div>
<!-- Hint Pill -->
<div class="mt-lg px-6 py-3 bg-primary-container/10 border-2 border-primary-container/20 rounded-full text-primary font-label-lg flex items-center gap-2 animate-pulse-soft">
<span class="material-symbols-outlined text-sm">visibility</span>

                    </div>
</div>
</div>
</div>
<!-- Action Buttons -->

<button class="bg-coral-soft text-white font-title-md super-ellipse py-4 shadow-lg active-press transition-all hover:brightness-105 flex items-center justify-center gap-2">
                Не знаю
            </button>
<button class="bg-primary-container text-on-primary-container font-title-md super-ellipse py-4 shadow-lg active-press transition-all hover:brightness-105 flex items-center justify-center gap-2">
                Знаю <span class="material-symbols-outlined font-bold text-xl">done</span>
</button>
</div>
<!-- Explanation Line -->
<div class="text-center px-4">
<p class="text-secondary font-label-sm leading-relaxed opacity-70">

                «Не знаю» — повторим сегодня.
            </p>
</div>

<nav class="fixed bottom-6 left-0 right-0 z-50 flex justify-around items-center w-full max-w-sm mx-auto bg-surface-container-low/80 backdrop-blur-md rounded-full px-6 py-3 shadow-xl border border-white/20">

<span class="material-symbols-outlined">emoji_events</span>
</a>
<a class="text-secondary p-3 hover:text-primary-container transition-colors active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined">person</span>
</a>
</nav>
<!-- Micro-interactions Script -->
<script>
        const card = document.getElementById('flashcard');
        let flipped = false;
        card.addEventListener('click', () => {
            flipped = !flipped;
            const content = card.querySelector('h2');
            const hint = card.querySelector('.animate-pulse-soft');

            if (flipped) {
                card.style.transform = 'rotateY(10deg) scale(0.98)';
                setTimeout(() => {
                    card.style.transform = 'rotateY(0deg) scale(1)';
                    content.innerText = 'Откуда вы?';
                    content.classList.add('text-primary');
                    hint.innerHTML = '<span class="material-symbols-outlined text-sm">cached</span> Нажми для оригинала';
                }, 150);
            } else {
                card.style.transform = 'rotateY(-10deg) scale(0.98)';
                setTimeout(() => {
                    card.style.transform = 'rotateY(0deg) scale(1)';
                    content.innerText = 'Сіз қайдансыз?';
                    content.classList.remove('text-primary');
                    hint.innerHTML = '<span class="material-symbols-outlined text-sm">visibility</span> Нажми, чтобы увидеть перевод';
                }, 150);
            }
        });
    </script>
