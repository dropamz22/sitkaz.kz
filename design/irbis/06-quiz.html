<style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #FDFEFF;
            overflow-x: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .snow-hill {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 300px;
            z-index: -1;
            background: linear-gradient(180deg, rgba(253, 254, 255, 0) 0%, rgba(234, 242, 249, 0.4) 100%);
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
            transform: scaleX(1.5) translateY(50px);
        }
        .snow-hill-2 {
            position: fixed;
            bottom: -20px;
            left: -10%;
            right: -10%;
            height: 200px;
            z-index: -1;
            background: rgba(214, 230, 242, 0.3);
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
            filter: blur(10px);
        }
        .pulse-amber {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-ring {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.1; }
        }
        .pebble-shadow {
            box-shadow: 0 20px 40px rgba(51, 71, 92, 0.06);
        }
        .active-tap {
            transform: scale(0.95);
            transition: transform 0.15s ease;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<body class="text-slate-blue min-h-screen flex flex-col">
<!-- Background Elements -->
<div class="snow-hill"></div>
<div class="snow-hill-2"></div>
<!-- Top App Bar -->

<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="font-title-md text-title-md font-bold text-primary">⭐ Білгір</h1>
<div class="w-12 h-12 rounded-full border-2 border-ice-deep overflow-hidden">

</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow w-full max-w-md mx-auto px-gutter mt-6 mb-32 flex flex-col items-center">
<!-- Progress Capsule -->
<div class="w-full bg-ice-tint rounded-xl p-base mb-sm">
<div class="relative h-12 flex items-center px-sm">
<!-- Inner Track -->
<div class="absolute inset-x-2 h-2 bg-ice-deep rounded-full overflow-hidden">
<div class="h-full bg-warm-amber w-[40%] rounded-full shadow-sm"></div>
</div>
<!-- Progress Text -->
<div class="z-10 w-full flex justify-center">
<span class="font-label-lg text-label-lg bg-ice-tint px-4 py-1 rounded-full text-slate-blue">
                        Вопрос 4 из 10 · очки: 3
                    </span>
</div>
</div>
</div>
<!-- Section Label Chip -->
<div class="bg-ice-deep rounded-full px-6 py-2 mb-lg border-2 border-white shadow-sm">
<span class="font-body-md text-body-md text-slate-blue">Аудирование: послушай и выбери</span>
</div>
<!-- Listen Interaction -->

</div>
<div class="absolute -bottom-2 -right-2 bg-warm-amber w-14 h-14 rounded-full flex items-center justify-center text-white shadow-lg group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">volume_up</span>

<!-- Default Option -->

</main>

<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-40px)] max-w-sm rounded-full bg-surface-container-low/80 backdrop-blur-md px-6 py-3 shadow-[0_20px_40px_rgba(51,71,92,0.12)] z-50">
<div class="flex justify-around items-center">

<span class="material-symbols-outlined text-2xl">home</span>
</a>

<!-- Profile -->
<a class="text-secondary p-3 hover:text-primary-container transition-colors active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined text-2xl">person</span>
</a>
</div>
</nav>
<script>
        // Simple micro-interactions
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => btn.classList.add('active-tap'));
            btn.addEventListener('mouseup', () => btn.classList.remove('active-tap'));
            btn.addEventListener('mouseleave', () => btn.classList.remove('active-tap'));
        });

        // Listen button specific effect
        const listenBtn = document.querySelector('.pebble-shadow');
        if(listenBtn) {
            listenBtn.addEventListener('click', () => {
                // Add a small bounce effect
                listenBtn.style.transform = 'scale(0.92)';
                setTimeout(() => {
                    listenBtn.style.transform = 'scale(1)';
                }, 150);
            });
        }
    </script>
