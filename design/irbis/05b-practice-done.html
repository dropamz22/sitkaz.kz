<script>
        // Micro-interaction for button press
        document.querySelector('button').addEventListener('mousedown', function() {
            this.style.transform = 'scale(0.96)';
        });
        document.querySelector('button').addEventListener('mouseup', function() {
            this.style.transform = 'scale(1)';
        });

        // Dynamic Greeting based on time
        const hour = new Date().getHours();
        const greetingElement = document.querySelector('p.font-body-md.text-secondary');
        if (hour < 12) {
            greetingElement.textContent = "Қайырлы таң! Ирбис уже готов к новым вершинам.";
        } else if (hour < 18) {
            greetingElement.textContent = "Отличная дневная тренировка! Ирбис доволен результатом.";
        } else {
            greetingElement.textContent = "Кеш жарық! Ирбис отдыхает после продуктивного дня.";
        }
    </script>
