<!-- Scripts for confetti and animations -->
<script>
        function createConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#43ded4', '#ebc24e', '#ffffff', '#00c2b8'];
            const count = 60;
            for (let i = 0; i < count; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';

                const size = Math.random() * 8 + 4;
                const left = Math.random() * 100;
                const delay = Math.random() * 3;
                const color = colors[Math.floor(Math.random() * colors.length)];

                confetti.style.width = `${size}px`;
                confetti.style.height = `${size}px`;
                confetti.style.left = `${left}%`;
                confetti.style.backgroundColor = color;
                confetti.style.animation = `fall ${Math.random() * 2 + 2}s ease-in ${delay}s forwards`;

                // Random shape
                if (Math.random() > 0.5) confetti.style.borderRadius = '50%';

                container.appendChild(confetti);
            }
        }
        // Initialize effects
        window.addEventListener('load', () => {
            createConfetti();
        });
        // Re-trigger confetti on CTA hover for fun
        document.querySelector('button').addEventListener('mouseenter', () => {
            if (document.querySelectorAll('.confetti').length < 30) {
                createConfetti();
            }
        });
    </script>
<!-- Custom keyframe for initial scale in -->
<style>
        @keyframes scaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
