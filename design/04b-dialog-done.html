<script>
        // Micro-interaction: Confetti generation
        function createConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#43ded4', '#ebc24e', '#ffffff', '#00c2b8'];

            for (let i = 0; i < 40; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');

                // Random position and delay
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = '-5vh';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animation = `confetti-fall ${2 + Math.random() * 3}s linear forwards`;
                confetti.style.animationDelay = Math.random() * 3 + 's';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';

                container.appendChild(confetti);

                // Cleanup
                setTimeout(() => {
                    confetti.remove();
                }, 6000);
            }
        }
        // Trigger confetti on load
        window.addEventListener('DOMContentLoaded', () => {
            createConfetti();
            // Repeat every few seconds for a continuous celebration effect
            setInterval(createConfetti, 4000);
        });
        // Micro-interaction for feedback
        document.querySelector('button').addEventListener('click', () => {
            console.log('Returning to lesson...');
        });
